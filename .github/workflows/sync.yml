name: Sync schedule from live sheet

on:
  schedule:
    - cron: "17 */12 * * *"   # every 12 hours
  workflow_dispatch: {}        # manual "Sync now" from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch schedule and rebuild database
        run: python3 scripts/sync_schedule.py
      - name: Commit if changed
        run: |
          git config user.name "schedule-sync-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: sync schedule from live sheet"
            git push
          fi
