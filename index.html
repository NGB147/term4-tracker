<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Term IV Tracker — MBA 2025-27</title>
<style>
  :root{
    --bg:#052540; --panel:#0a3a63; --panel2:#0e4778; --line:#1c5f97;
    --txt:#eaf4ff; --muted:#a9c7e6; --sky:#37b6ff; --orange:#ff7a1a; --saffron:#ff9838;
    --good:#2fd08a; --bad:#ff5d6c; --warn:#ffc24d; --chip:#0e3a60;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:
    radial-gradient(1200px 500px at 80% -10%, #0b4d84 0, transparent 60%),
    var(--bg);color:var(--txt);font-size:14px;min-height:100vh}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(120deg,#063d70 0%,#0a63a8 55%,#0b74c4 100%);border-bottom:3px solid var(--orange);padding:10px 16px;box-shadow:0 3px 14px rgba(0,0,0,.35)}
  .htop{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.3px}
  .sub{color:#cfe6ff;font-size:12px}
  .spacer{flex:1}
  select,input,textarea,button{font-family:inherit;font-size:13px}
  select,input,textarea{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 9px}
  textarea{width:100%;resize:vertical}
  button{cursor:pointer;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:7px 11px;transition:.15s}
  button:hover{border-color:var(--sky)}
  button:disabled{opacity:.4;cursor:default}
  .btn-accent{background:linear-gradient(90deg,var(--orange),var(--saffron));border-color:var(--orange);color:#2a1400;font-weight:700}
  .btn-sky{background:var(--sky);border-color:var(--sky);color:#05263f;font-weight:700}
  .tabs{display:flex;gap:4px;margin-top:10px;flex-wrap:wrap}
  .tab{padding:7px 13px;border-radius:9px 9px 0 0;border:1px solid transparent;color:#d7ecff;background:rgba(255,255,255,.06)}
  .tab.active{color:#05263f;background:var(--sky);border-color:var(--sky);font-weight:700}
  .tab .dot{display:inline-block;min-width:16px;padding:0 4px;margin-left:5px;font-size:11px;background:var(--orange);color:#2a1400;border-radius:10px;font-weight:700}
  main{max-width:1080px;margin:0 auto;padding:18px 16px 60px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.2)}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .grid{display:grid;gap:12px}
  .g2{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .g3{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  h2{font-size:15px;margin:0 0 12px}
  .banner{background:linear-gradient(90deg,rgba(255,122,26,.22),rgba(255,152,56,.10));border:1px solid var(--orange);border-radius:12px;padding:13px 15px;margin-bottom:16px}
  .banner b{color:var(--saffron)}
  .chip{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:20px;padding:2px 10px;font-size:12px;color:#cfe6ff}
  .pchips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .pchip{padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:var(--chip);cursor:pointer;font-size:13px}
  .pchip.active{background:linear-gradient(90deg,var(--orange),var(--saffron));color:#2a1400;font-weight:700;border-color:var(--orange)}
  .pchip .x{margin-left:7px;opacity:.7}
  .cls{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);margin-bottom:9px}
  .cls.pending{border-color:var(--orange);box-shadow:0 0 0 1px rgba(255,122,26,.35) inset}
  .cls .info{min-width:0}
  .cls .code{font-weight:700}
  .cls .nm{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cls .slot{color:var(--sky);font-size:11px;font-weight:700}
  .att-btns{display:flex;gap:5px;flex-shrink:0}
  .ab{padding:5px 9px;font-size:12px;border-radius:7px}
  .ab.sel[data-s=P]{background:var(--good);color:#043;border-color:var(--good)}
  .ab.sel[data-s=A]{background:var(--bad);color:#400;border-color:var(--bad)}
  .ab.sel[data-s=C]{background:var(--warn);color:#420;border-color:var(--warn)}
  .bar{height:10px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--orange))}
  .stat{font-size:26px;font-weight:800}
  .stat.sm{font-size:18px}
  .muted{color:var(--muted)}
  .big3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .kpi{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;text-align:center}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
  .pill.done{background:rgba(47,208,138,.15);color:var(--good);border:1px solid var(--good)}
  .pill.due{background:rgba(255,194,77,.15);color:var(--warn);border:1px solid var(--warn)}
  .pill.over{background:rgba(255,93,108,.15);color:var(--bad);border:1px solid var(--bad)}
  .link{color:var(--sky);cursor:pointer;text-decoration:underline;font-size:12px}
  .small{font-size:12px}
  .day-nav{display:flex;gap:6px;align-items:center}
  .empty{color:var(--muted);padding:14px;text-align:center;font-style:italic}
  .tag{font-size:10px;padding:1px 6px;border-radius:5px;background:var(--chip);color:#cfe6ff;margin-left:6px}
  .warnrow{color:var(--warn);font-weight:700}
  .okrow{color:var(--good);font-weight:700}
  .flex-tbl td:last-child{text-align:right}
  .weekgrid{overflow-x:auto}
  .weekgrid table{min-width:760px}
  .wc{font-size:11px;padding:6px 4px;text-align:center;vertical-align:top}
  .wc .b{display:block;background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:3px 2px;margin:2px 0;font-weight:600}
  .wc .b.now{border-color:var(--orange)}
  .search-wrap{position:relative}
  .sr{position:absolute;top:100%;left:0;right:0;z-index:30;background:var(--panel2);border:1px solid var(--line);border-radius:0 0 10px 10px;max-height:260px;overflow:auto}
  .sr div{padding:8px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)}
  .sr div:hover{background:var(--chip)}
  .modal-bg{position:fixed;inset:0;background:rgba(2,15,28,.75);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:520px;width:100%;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  a{color:var(--sky)}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div>
      <h1>&#127951; Term IV Tracker <span class="tag">MBA 2025-27</span></h1>
      <div class="sub" id="rangeSub"></div>
    </div>
    <div class="spacer"></div>
    <button id="syncBtn" title="Sync schedule from the live Google Sheet">&#128260; Sync</button>
    <button id="bellBtn" title="Enable class &amp; attendance reminders">&#128276; Reminders: off</button>
    <button id="whoBtn" title="Change who I am">&#128100; <span id="whoName">Set profile</span></button>
    <label class="small" style="color:#d7ecff">Target %</label>
    <input id="targetInp" type="number" min="0" max="100" value="75" style="width:60px">
  </div>
  <div class="tabs" id="tabs">
    <div class="tab active" data-t="today">Today</div>
    <div class="tab" data-t="week">Week</div>
    <div class="tab" data-t="attendance">Attendance</div>
    <div class="tab" data-t="courses">Courses</div>
    <div class="tab" data-t="learnings">Learnings</div>
    <div class="tab" data-t="assignments">Assignments</div>
    <div class="tab" data-t="friends">Friends</div>
    <div class="tab" data-t="holidays">Holidays</div>
  </div>
</header>

<script>

const SLOT_MIN = [[480,570],[600,690],[720,810],[870,960],[990,1080],[1110,1200],[1230,1320]];
const C = window.COURSES || {}, STU = window.STUDENTS || {};
const MID = " · ", DASH = " – ", ARL="◀", ARR="▶", CHK="✓", CROSS="✕";
const $ = s=>document.querySelector(s);

const DB={load(){try{return JSON.parse(localStorage.getItem('t4tracker')||'{}')}catch(e){return{}}}};
let state = Object.assign({me:null,target:75,attendance:{},learnings:{},assignments:[],friends:[],reminders:false,liveUrl:'',lastSync:0}, DB.load());
// migrate old friends format (objects with name/section) -> keep only regId strings
state.friends = (state.friends||[]).filter(f=>typeof f==='string' && STU[f]);
const DEFAULT_LIVE='https://docs.google.com/spreadsheets/d/1kyLrZ_j2TTeJqiAt4N2W1FkgMXPl_Cwx1RbYXDml4ic/edit';  // Hritik's public mirror (IMPORTRANGE of the official sheet)
if(!state.liveUrl) state.liveUrl=DEFAULT_LIVE;
// migrate: the official sheet link can't be fetched anonymously (requires OAuth) — switch to the mirror
if(state.liveUrl.includes('1E0AaPYJi_sJXar2Wr12Di_0_MW92UdWMOn2BHkuSyUQ')) state.liveUrl=DEFAULT_LIVE;

function persist(){ localStorage.setItem('t4tracker', JSON.stringify(state)); }

// live schedule override (synced from Google Sheet) falls back to baked-in
function validSched(arr){
  if(!Array.isArray(arr)||arr.length<50) return false;
  const okSec=/^(Section A|Section B|Single Section)$/i;
  const dd=new Set();
  for(const r of arr){
    if(!r||typeof r.date!=='string'||!/^\d{4}-\d{2}-\d{2}$/.test(r.date)) return false;
    if(!okSec.test(r.section||'')) return false;
    if(!Array.isArray(r.slots)||r.slots.length!==7) return false;
    dd.add(r.date);
  }
  return dd.size>=15;
}
let SCH = window.SCHEDULE || [];
try{
  const ov=JSON.parse(localStorage.getItem('t4sched')||'null');
  if(validSched(ov)) SCH=ov;
  else if(ov!==null) localStorage.removeItem('t4sched');   // junk from an old sync -> discard
}catch(e){ try{localStorage.removeItem('t4sched');}catch(_){} }
let dates=[...new Set(SCH.map(r=>r.date))].sort();
// ---------- repo database (data/data.json, refreshed by GitHub Action every 12h or manual run) ----------
function applyDataset(ds){
  if(!ds||typeof ds!=='object')return false;
  let changed=false;
  if(ds.courses&&Object.keys(ds.courses).length>=10){ Object.keys(C).forEach(k=>delete C[k]); Object.assign(C,ds.courses); changed=true; }
  if(ds.students&&Object.keys(ds.students).length>=100){ Object.keys(STU).forEach(k=>delete STU[k]); Object.assign(STU,ds.students); changed=true; }
  // schedule from the repo DB only if no fresher client-side sheet sync is cached
  if(validSched(ds.schedule)&&!localStorage.getItem('t4sched')){ SCH=ds.schedule; dates=[...new Set(SCH.map(r=>r.date))].sort(); changed=true; }
  return changed;
}
function loadDataset(){
  fetch('data/data.json?v='+Date.now(),{cache:'no-store'}).then(r=>r.ok?r.json():null).then(ds=>{
    if(ds&&applyDataset(ds)){ if(!dates.includes(curDate))curDate=todayISO(); state.friends=(state.friends||[]).filter(f=>STU[f]); render(); scheduleReminders(); }
  }).catch(()=>{});
}

const dayName=d=>new Date(d+'T00:00').toLocaleDateString('en-US',{weekday:'long'});
const fmt=d=>new Date(d+'T00:00').toLocaleDateString('en-US',{weekday:'short',day:'numeric',month:'short'});
const titleCase=s=>s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase());
const NAME_OVERRIDE={'2025MBA180':'Rishita'};
const firstName=id=>NAME_OVERRIDE[id]||(STU[id]?titleCase(STU[id].n.split(' ')[0]):id);

function me(){ return state.me && STU[state.me] ? STU[state.me] : null; }
function personOf(id){ return STU[id]||null; }
function secName(letter){ return 'Section '+letter; }

function parseCell(txt){
  if(!txt) return null;
  let m=txt.match(/^([A-Z]{2,4})\s*[-\s]*\s*(\d+)/);
  if(m&&C[m[1]]) return {code:m[1],sess:+m[2],raw:txt};
  let m2=txt.match(/^([A-Z]{2,4})\b/);
  if(m2&&C[m2[1]]) return {code:m2[1],sess:null,raw:txt};
  return {code:null,sess:null,raw:txt,event:true};
}
// classes for a date, personalized PER COURSE: a student can be Sec A in one course and Sec B in another
function classesFor(date, personId){
  const p=personOf(personId); if(!p) return [];
  const rows=SCH.filter(r=>r.date===date);
  const out=[]; const seen=new Set();
  rows.forEach(r=>r.slots.forEach((cell,si)=>{
    if(!cell)return;
    const pc=parseCell(cell); if(!pc)return;
    if(pc.code){
      if(!(pc.code in p.c)) return;                       // not enrolled
      const cs=p.c[pc.code];                              // 'A' | 'B' | '' (course not sectioned)
      if(r.section==='Single Section' || (cs && r.section==='Section '+cs)){
        out.push({date,slot:si,section:r.section,cell,...pc});
      } else if(!cs && r.section!=='Single Section'){     // unknown section: first occurrence of each session
        const k=pc.code+'|'+(pc.sess||cell);
        if(!seen.has(k)){ seen.add(k); out.push({date,slot:si,section:r.section,cell,...pc}); }
      }
    } else {
      const hs='Section '+(p.s||'A');                     // events: home-section or common row, deduped
      if((r.section===hs||r.section==='Single Section') && !seen.has('e|'+pc.raw)){ seen.add('e|'+pc.raw); out.push({date,slot:si,section:r.section,cell,...pc}); }
    }
  }));
  return out.sort((a,b)=>a.slot-b.slot);
}
const attKey=(date,slot,code)=>`${date}|${slot}|${code||'x'}`;
function localISO(t){t=t||new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function todayISO(){const iso=localISO();if(!dates.length)return iso;if(dates.includes(iso))return iso;const up=dates.find(d=>d>=iso);return up||dates[0];}
let curDate=todayISO(), curTab='today', curPerson='me', curSubject=null, holidayExcl=new Set();

function pendingToday(){
  if(!me())return[];
  const iso=localISO(); if(!dates.includes(iso)) return [];
  const now=new Date().getHours()*60+new Date().getMinutes();
  return classesFor(iso,state.me).filter(c=>c.code && now>=SLOT_MIN[c.slot][1] && !state.attendance[attKey(c.date,c.slot,c.code)]);
}
function courseStats(){
  const stats={}; if(!me())return stats;
  dates.forEach(d=>classesFor(d,state.me).forEach(c=>{
    if(!c.code)return;
    const s=stats[c.code]||(stats[c.code]={total:0,present:0,absent:0,cancelled:0,held:0,sessions:new Set()});
    s.total++; if(c.sess)s.sessions.add(c.sess);
    const st=state.attendance[attKey(c.date,c.slot,c.code)];
    if(st==='P'){s.present++;s.held++}else if(st==='A'){s.absent++;s.held++}else if(st==='C'){s.cancelled++}
  }));
  return stats;
}
function overall(){const st=courseStats();let held=0,present=0,total=0;Object.values(st).forEach(s=>{held+=s.held;present+=s.present;total+=s.total});return{held,present,total,pct:held?Math.round(present/held*100):0};}

// ---------- live sync via Google gviz (script-tag JSONP, works for link-shared sheets) ----------
function sheetIdFrom(url){ const m=(url||'').match(/\/d\/([a-zA-Z0-9-_]{20,})/); return m?m[1]:null; }
function excelSerialToISO(n){ const d=new Date(Date.UTC(1899,11,30)+n*86400000); return d.toISOString().slice(0,10); }
let syncInteractive=false;
function syncNow(interactive){
  const id=sheetIdFrom(state.liveUrl);
  if(!id){ if(interactive) openSyncModal(); return; }
  syncInteractive=!!interactive;
  window.google=window.google||{}; google.visualization=google.visualization||{};
  google.visualization.Query=google.visualization.Query||{};
  function attempt(noSheetParam){
    google.visualization.Query.setResponse=function(resp){
      try{
        if(resp&&resp.status==='error'){
          if(!noSheetParam){ attempt(true); return; }   // tab may not be named "Schedule" — retry with the first tab
          const e0=(resp.errors&&resp.errors[0])||{};
          throw new Error((e0.reason?e0.reason+': ':'')+(e0.detailed_message||e0.message||'Google returned an error'));
        }
        if(!resp||!resp.table||!resp.table.rows) throw new Error('empty response from Google');
        const rows=resp.table.rows;
        const recs=[]; let curD=null;
        rows.forEach(r=>{
          const c=r.c||[];
          const gv=i=>(c[i]&&c[i].v!=null)?c[i].v:'';
          let dv=gv(0);
          if(dv){
            if(typeof dv==='string'){const dm=dv.match(/Date\((\d+),(\d+),(\d+)/); if(dm){curD=`${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`;} }
            else if(dv instanceof Date){curD=localISO(dv);}
            else if(typeof dv==='number'){curD=excelSerialToISO(dv);}
          }
          const sec=String(gv(2)||'').trim();
          if(!curD||!/Section/i.test(sec)) return;
          const slots=[3,4,5,7,8,9,10].map(i=>String(gv(i)||'').replace(/\s+/g,' ').trim());
          recs.push({date:curD,day:dayName(curD),section:sec,slots});
        });
        const okSec=/^(Section A|Section B|Single Section)$/i;
        const clean=recs.filter(r=>/^\d{4}-\d{2}-\d{2}$/.test(r.date)&&okSec.test(r.section)&&Array.isArray(r.slots)&&r.slots.length===7);
        const dcount=new Set(clean.map(r=>r.date)).size;
        if(clean.length>=50&&dcount>=15){
          const newStr=JSON.stringify(clean);
          const changed=newStr!==localStorage.getItem('t4sched');
          localStorage.setItem('t4sched',newStr);
          SCH=clean; dates=[...new Set(SCH.map(r=>r.date))].sort();
          state.lastSync=Date.now(); persist();
          if(changed){
            if(!dates.includes(curDate)) curDate=todayISO();
            render(); scheduleReminders();
            toast('🔄 Schedule updated from the live sheet ('+dcount+' days)');
          } else if(syncInteractive){ render(); toast('✅ Synced — already up to date'); }
        } else if(!noSheetParam){ attempt(true); }
        else if(syncInteractive){ toast('⚠️ Reached the sheet but found no timetable rows — is the schedule on the first tab (or a tab named "Schedule") with Date / Day / Section columns?'); }
      }catch(e){ if(syncInteractive) toast('⚠️ Sync failed: '+e.message); }
    };
    const s=document.createElement('script');
    s.src='https://docs.google.com/spreadsheets/d/'+id+'/gviz/tq?tqx=out:json&headers=0'+(noSheetParam?'':'&sheet=Schedule');
    s.onload=()=>s.remove();
    s.onerror=()=>{s.remove();if(syncInteractive)toast('⚠️ Live sheet blocked this fetch. Use the browser where Google Drive opens with your IIM account, or set up a mirror sheet (open Sync for steps).');};
    document.head.appendChild(s);
  }
  attempt(false);
  if(interactive) toast('⏳ Syncing…');
}
function toast(msg){
  let t=$('#toast'); if(t)t.remove();
  t=document.createElement('div'); t.id='toast';
  t.style.cssText='position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--sky);color:var(--txt);padding:10px 18px;border-radius:10px;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,.4);font-size:13px';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{if(t.parentNode)t.remove()},4500);
}

let timers=[];
function notify(title,body){ if(!('Notification'in window)||Notification.permission!=='granted')return; try{new Notification(title,{body,tag:title})}catch(e){} }
function clearTimers(){timers.forEach(t=>{clearTimeout(t);clearInterval(t)});timers=[];}
function scheduleReminders(){
  clearTimers(); updateBell();
  if(!state.reminders||!me())return;
  const iso=localISO(); if(!dates.includes(iso))return;
  const nowMin=new Date().getHours()*60+new Date().getMinutes();
  classesFor(iso,state.me).filter(c=>c.code).forEach(c=>{
    const [st,en]=SLOT_MIN[c.slot];
    if(st>nowMin){ timers.push(setTimeout(()=>notify('📚 Class starting',`${c.code}${c.sess?'-'+c.sess:''} — ${C[c.code].name} at ${SLOTS[c.slot].split('-')[0]}`),(st-nowMin)*60000)); }
    if(en>nowMin){ timers.push(setTimeout(()=>{ if(!state.attendance[attKey(c.date,c.slot,c.code)]){notify('✅ Mark attendance',`Did you attend ${c.code}${c.sess?'-'+c.sess:''}? Open the app to mark P/A.`);} if(curTab==='today')render(); },(en-nowMin)*60000+60000)); }
  });
  timers.push(setInterval(()=>{updateBell();if(pendingToday().length&&curTab==='today')render();},60000));
}
function updateBell(){
  const b=$('#bellBtn'); if(!b)return;
  const on=state.reminders&&('Notification'in window)&&Notification.permission==='granted';
  b.innerHTML = on? '🔔 Reminders: on' : '🔔 Reminders: off';
  b.classList.toggle('btn-sky',on);
}
async function toggleReminders(){
  if(state.reminders){state.reminders=false;persist();scheduleReminders();return;}
  if(!('Notification'in window)){alert('This browser does not support notifications, but in-app reminders will still work.');state.reminders=true;persist();scheduleReminders();return;}
  let perm=Notification.permission;
  if(perm!=='granted') perm=await Notification.requestPermission();
  state.reminders=true;persist();
  if(perm==='granted') notify('🔔 Reminders enabled',"You'll get class-start and attendance reminders while this tab is open.");
  else alert('Notifications were blocked by the browser. In-app reminders (banner + Today badge) still work. Allow notifications for this page in browser settings to get pop-ups.');
  scheduleReminders();
}

function bunkable(present,held,total,target){

    dates.forEach(d=>classesFor(d,state.me).forEach(c=>{if(c.code===code&&c.sess){const k=attKey(c.date,c.slot,c.code);if(state.attendance[k]==='P'||state.attendance[k]==='A')done.add(c.sess);}}));
    const prog=totalSess?Math.round(done.size/totalSess*100):0;
    return `<div class="card" style="cursor:pointer;margin-bottom:0" data-subj="${code}"><div class="row" style="justify-content:space-between"><h2 style="margin:0">${code} <span class="tag">${C[code].credits} cr</span></h2><span class="muted small">${done.size}/${totalSess} sessions</span></div>
      <div class="muted small" style="margin:4px 0 10px">${C[code].name}<br>${C[code].prof||''}</div>
      <div class="bar"><i style="width:${prog}%"></i></div>
      <div class="small muted" style="margin-top:6px">Progress ${prog}%${MID}${s.present} attended${MID}${s.cancelled} off${MID}<span class="link">open tab ▸</span></div></div>`;}).join('');
  const extra=unscheduled.length?`<div class="card" style="margin-top:16px"><h2>Also enrolled (not on this timetable yet)</h2><div class="row">${unscheduled.map(c=>`<span class="chip">${c}${MID}${C[c]?C[c].name:''}</span>`).join('')}</div></div>`:'';
  return chips+`<div class="grid g3">${cards||'<div class="empty">No scheduled courses.</div>'}</div>${extra}`;
}
function vSubjectDetail(code){
  const p=C[code]||{name:code,prof:'',credits:''};
  const sess=[];
  dates.forEach(d=>classesFor(d,state.me).forEach(c=>{if(c.code===code)sess.push(c);}));
  let present=0,absent=0,off=0,held=0;
  const iso=localISO();
  const rows=sess.map(c=>{
    const k=attKey(c.date,c.slot,c.code); const stt=state.attendance[k]||'';
    if(stt==='P'){present++;held++}else if(stt==='A'){absent++;held++}else if(stt==='C'){off++}
    const note=state.learnings[`${c.date}|${c.code}|${c.sess||''}`]||'';
    const isPast=c.date<iso, isToday=c.date===iso;
    return `<tr style="${isToday?'background:rgba(255,122,26,.08)':''}">
      <td><b>${code}${c.sess?'-'+c.sess:''}</b>${isToday?' <span class="tag" style="background:var(--orange);color:#2a1400">today</span>':''}</td>
      <td class="small">${fmt(c.date)}<div class="muted small">${SLOTS[c.slot]}</div></td>
      <td><div class="att-btns">
        <button class="ab ${stt==='P'?'sel':''}" data-s="P" data-k="${k}">P</button>
        <button class="ab ${stt==='A'?'sel':''}" data-s="A" data-k="${k}">A</button>
        <button class="ab ${stt==='C'?'sel':''}" data-s="C" data-k="${k}">Off</button></div></td>
      <td class="small" style="max-width:280px">${note?note.replace(/</g,'&lt;')+' <span class="link" data-learn="'+c.date+'|'+c.code+'|'+(c.sess||'')+'">edit</span>':'<span class="link" data-learn="'+c.date+'|'+c.code+'|'+(c.sess||'')+'">+ note</span>'}</td>
    </tr>`;
  }).join('');
  const pct=held?Math.round(present/held*100):0;
  const friendsIn=state.friends.filter(f=>STU[f]&&(code in STU[f].c)).map(f=>firstName(f));
  return `<div class="card">
    <div class="row" style="justify-content:space-between"><h2 style="margin:0">${code}${MID}${p.name} <span class="tag">${p.credits} cr</span></h2>
    <span class="${held?(pct>=state.target?'okrow':'warnrow'):'muted'}">${held?pct+'% attendance':'no classes marked yet'}</span></div>
    <div class="muted small" style="margin:4px 0 6px">${me().c[code]?'My section: '+me().c[code]+MID:''}${p.prof||''}</div>
    <div class="muted small" style="margin:0 0 12px">${sess.length} sessions${MID}${present} present${MID}${absent} absent${MID}${off} off${friendsIn.length?MID+'👥 with you: '+friendsIn.join(', '):''}</div>
    <table><thead><tr><th>Session</th><th>When</th><th>Attendance</th><th>Note / learning</th></tr></thead><tbody>${rows||'<tr><td colspan=4 class="empty">No sessions on the timetable yet.</td></tr>'}</tbody></table>
  </div>`;
}
function vLearn(){
  const keys=Object.keys(state.learnings).filter(k=>state.learnings[k].trim()).sort((a,b)=>b.localeCompare(a));
  const list=keys.map(k=>{const [date,code,sess]=k.split('|');
    return `<div class="cls"><div class="info"><div><span class="code">${code}${sess?'-'+sess:''}</span> <span class="slot">${fmt(date)}</span></div><div class="nm" style="white-space:normal;color:var(--txt)">${state.learnings[k].replace(/</g,'&lt;')}</div></div><button data-dellearn="${k}">${CROSS}</button></div>`;}).join('');
  const cs=classesFor(curDate,state.me).filter(c=>c.code);
  const opts=cs.map(c=>`<option value="${curDate}|${c.code}|${c.sess||''}">${fmt(curDate)}${MID}${c.code}${c.sess?'-'+c.sess:''}</option>`).join('');
  return `<div class="card"><h2>Log a learning</h2><div class="row"><select id="learnSel">${opts||'<option>No classes on selected date</option>'}</select>
    <button id="prevD2">${ARL} day</button><button id="nextD2">day ${ARR}</button></div>
    <textarea id="learnTxt" rows="3" placeholder="Key takeaway, concept, formula, framework..." style="margin-top:10px"></textarea>
    <div style="margin-top:8px"><button class="btn-accent" id="saveLearn">Save note</button></div></div>
    <div class="card"><h2>All learnings <span class="muted small">(${keys.length})</span></h2>${list||'<div class="empty">No notes yet.</div>'}</div>`;
}
function vAssign(){
  const a=state.assignments.slice().sort((x,y)=>(x.due||'').localeCompare(y.due||''));
  const today=localISO();
  const rows=a.map(it=>{let cls='due',lbl='Due';if(it.status==='done'){cls='done';lbl='Done'}else if(it.due&&it.due<today){cls='over';lbl='Overdue'}
    return `<tr><td><b>${it.course||'—'}</b></td><td>${it.title.replace(/</g,'&lt;')}</td><td class="small">${it.due?fmt(it.due):'—'}</td>
      <td><span class="pill ${cls}">${lbl}</span></td>
      <td><button data-toggle="${it.id}">${it.status==='done'?'Reopen':'Done'}</button> <button data-dela="${it.id}">${CROSS}</button></td></tr>`;}).join('');
  const opts=Object.keys(me().c).sort().map(c=>`<option value="${c}">${c}${C[c]?' — '+C[c].name:''}</option>`).join('');
  const openCount=state.assignments.filter(x=>x.status!=='done').length;
  return `<div class="card"><h2>Add assignment</h2><div class="grid g2">
      <select id="aCourse"><option value="">Course...</option>${opts}</select>
      <input id="aTitle" placeholder="Title (e.g. SAPM case submission)">
      <input id="aDue" type="date"><button class="btn-accent" id="addA">Add</button></div></div>
    <div class="card"><h2>Assignments <span class="muted small">(${openCount} open)</span></h2>
    <table><thead><tr><th>Course</th><th>Title</th><th>Due</th><th>Status</th><th></th></tr></thead><tbody>${rows||'<tr><td class="empty" colspan=5>Nothing yet.</td></tr>'}</tbody></table></div>`;
}
function vFriends(){
  const fr=state.friends;
  const sb=studentSearchBox('frInp','frRes',id=>{
    if(id===state.me){toast("That's you 😄");return;}
    if(!state.friends.includes(id)){state.friends.push(id);persist();render();toast('Added '+titleCase(STU[id].n));}
  });
  const frCards=fr.map(f=>{const p=STU[f]; const cs=classesFor(curDate,f).filter(c=>c.code);
    const shared=Object.keys(p.c).filter(c=>c in me().c);
    return `<div class="card"><div class="row" style="justify-content:space-between"><h2 style="margin:0">${titleCase(p.n)}</h2><span class="chip">Sec ${p.s}</span></div>
      <div class="muted small" style="margin:4px 0 8px">${fmt(curDate)}${MID}${Object.keys(p.c).length} electives${MID}<b style="color:var(--saffron)">${shared.length} shared with you</b>: ${shared.join(', ')||'none'}</div>
      ${cs.length?cs.map(c=>`<div class="cls" style="margin-bottom:6px"><div class="info"><div><span class="code">${c.code}${c.sess?'-'+c.sess:''}</span> <span class="slot">${SLOTS[c.slot]}</span></div><div class="nm">${C[c.code].name}</div></div></div>`).join(''):'<div class="empty">No classes today.</div>'}
      <button data-delf="${f}" style="margin-top:8px">Remove</button></div>`;}).join('');
  let compare='';
  if(fr.length){const mine=new Set(classesFor(curDate,state.me).map(c=>c.slot));
    compare=`<div class="card"><h2>Common free slots${MID}${fmt(curDate)}</h2><div class="row">`;
    SLOTS.forEach((sl,si)=>{const free=!mine.has(si)&&!fr.some(f=>classesFor(curDate,f).some(c=>c.slot===si));
      compare+=`<span class="chip" style="${free?'border-color:var(--good);color:var(--good)':'opacity:.45'}">${sl} ${free?CHK:''}</span>`;});
    compare+=`</div><div class="muted small" style="margin-top:6px">Slots where you and every added friend are all free.</div></div>`;}
  return `${dayNavBar()}<div class="card"><h2>Add a friend from the roster</h2>${sb.html}<div class="muted small" style="margin-top:8px">Their section + electives load automatically. They also get a chip on the Today/Week tabs.</div></div>${compare}
    <div class="grid g3">${frCards||'<div class="empty">No friends added yet.</div>'}</div>
    <div style="display:none" id="frWire"></div>`;
}

function vHolidays(){
  const todayIso=localISO();
  const groupAll=state.friends.slice();
  const group=groupAll.filter(f=>!holidayExcl.has(f));
  const days=[];
  const start=new Date(dates[0]+'T00:00'), end=new Date(dates[dates.length-1]+'T00:00');
  for(let d=new Date(start); d<=end; d.setDate(d.getDate()+1)){
    const iso=localISO(d);
    let anyClasses=0, events=[];
    SCH.filter(r=>r.date===iso).forEach(r=>r.slots.forEach(cell=>{if(!cell)return;const p=parseCell(cell);if(p&&p.code)anyClasses++;else if(p&&p.raw&&!/lunch/i.test(p.raw))events.push(p.raw);}));
    const myCount=classesFor(iso,state.me).filter(c=>c.code).length;
    const busyFriends=group.filter(f=>classesFor(iso,f).filter(c=>c.code).length>0);
    days.push({iso,anyClasses,events:[...new Set(events)],myCount,busyFriends});
  }
  const campus=days.filter(x=>x.anyClasses===0);
  const myFree=days.filter(x=>x.myCount===0);
  const groupFree=days.filter(x=>x.myCount===0&&x.busyFriends.length===0);
  const almost=days.filter(x=>x.myCount===0&&x.busyFriends.length===1);
  const up=arr=>arr.filter(x=>x.iso>=todayIso);
  const past=arr=>arr.filter(x=>x.iso<todayIso);
  const dayLine=(x,extra)=>{
    const isPast=x.iso<todayIso, isToday=x.iso===todayIso;
    const wknd=/^S(at|un)/.test(dayName(x.iso));
    return `<div class="cls" style="${isPast?'opacity:.45;':''}${isToday?'border-color:var(--orange);':''}">
      <div class="info"><div><span class="code">${fmt(x.iso)}</span> <span class="slot">${dayName(x.iso)}${wknd?' 🌞':''}</span>
      ${x.anyClasses===0?'<span class="tag" style="background:rgba(47,208,138,.2);color:var(--good)">campus holiday</span>':'<span class="tag">others have class</span>'}
      ${isToday?'<span class="tag" style="background:var(--orange);color:#2a1400">today</span>':''}</div>
      <div class="nm" style="white-space:normal">${x.events.length?'📌 '+x.events.join(' · ')+' ':''}${extra||''}</div></div></div>`;
  };
  const kpi=`<div class="big3">
    <div class="kpi"><div class="stat okrow">${up(groupFree).length}</div><div class="muted small">Upcoming group-free days 🎉</div></div>
    <div class="kpi"><div class="stat sm">${up(myFree).length}</div><div class="muted small">Your free days left</div></div>
    <div class="kpi"><div class="stat sm">${up(campus).length}</div><div class="muted small">Campus holidays left</div></div></div>`;
  const groupCard=`<div class="card"><h2>🎉 Outing days — all ${group.length+1} of you free</h2>
    ${up(groupFree).map(x=>dayLine(x)).join('')||'<div class="empty">No upcoming days where everyone is free.</div>'}
    ${up(almost).length?`<h2 style="margin-top:16px">😬 Almost — just one person busy</h2>`+up(almost).map(x=>dayLine(x,`<b style="color:var(--warn)">${firstName(x.busyFriends[0])} has class</b>`)).join(''):''}</div>`;
  const myCard=`<div class="card"><h2>🌴 Days you have no classes</h2>
    ${up(myFree).map(x=>{
      const freeF=group.filter(f=>!x.busyFriends.includes(f));
      const note=x.busyFriends.length? `<span class="muted small">free with you: ${freeF.length?freeF.map(firstName).join(', '):'nobody 😢'}</span>`:'';
      return dayLine(x,note);
    }).join('')||'<div class="empty">No upcoming free days 😅</div>'}
    ${past(myFree).length?`<div class="muted small" style="margin:12px 0 6px">Already gone:</div>`+past(myFree).map(x=>dayLine(x)).join(''):''}</div>`;
  const selChips=`<div class="card" style="padding:12px 16px"><div class="row"><span class="small muted">Plan outing with:</span>${groupAll.map(f=>`<span class="pchip ${holidayExcl.has(f)?'':'active'}" data-hf="${f}">${firstName(f)}</span>`).join('')}${groupAll.length?`<span class="link" id="hfAll">${holidayExcl.size?'select all':''}</span>`:''}</div></div>`;
  return selChips+kpi+groupCard+myCard;
}

function goDay(delta){const i=dates.indexOf(curDate)+delta;if(i>=0&&i<dates.length){curDate=dates[i];render();}}
function wire(){
  const b=(id,fn)=>{const el=$('#'+id);if(el)el.onclick=fn;};
  b('prevD',()=>goDay(-1));b('nextD',()=>goDay(1));b('prevD2',()=>goDay(-1));b('nextD2',()=>goDay(1));
  b('jumpToday',()=>{curDate=todayISO();render();});
  b('enableFromBanner',()=>toggleReminders());
  b('onboardBtn',()=>openWhoModal());
  b('addFriendChip',()=>{curTab='friends';render();const i=$('#frInp');if(i)i.focus();});
  const ds=$('#dateSel');if(ds)ds.onchange=e=>{curDate=e.target.value;render();};
  document.querySelectorAll('[data-hf]').forEach(el=>el.onclick=()=>{const x=el.dataset.hf;if(holidayExcl.has(x))holidayExcl.delete(x);else holidayExcl.add(x);render();});
  const hfa=$('#hfAll'); if(hfa)hfa.onclick=()=>{holidayExcl.clear();render();};
  document.querySelectorAll('[data-subj]').forEach(el=>el.onclick=e=>{if(e.target.closest('.ab'))return;curSubject=el.dataset.subj||null;render();});
  document.querySelectorAll('[data-person]').forEach(el=>el.onclick=e=>{
    if(e.target.dataset.rmfriend)return;
    curPerson=el.dataset.person;render();});
  document.querySelectorAll('[data-rmfriend]').forEach(el=>el.onclick=e=>{e.stopPropagation();
    state.friends=state.friends.filter(x=>x!==el.dataset.rmfriend);if(curPerson===el.dataset.rmfriend)curPerson='me';persist();render();});
  document.querySelectorAll('.ab').forEach(el=>el.onclick=()=>{const k=el.dataset.k,s=el.dataset.s;
    if(state.attendance[k]===s)delete state.attendance[k];else state.attendance[k]=s;persist();render();});
  document.querySelectorAll('[data-learn]').forEach(el=>el.onclick=()=>{curTab='learnings';render();
    const [d,code,sess]=el.dataset.learn.split('|');const sel=$('#learnSel');const val=`${d}|${code}|${sess}`;
    if(sel&&[...sel.options].some(o=>o.value===val))sel.value=val;});
  b('saveLearn',()=>{const sel=$('#learnSel'),t=$('#learnTxt');if(sel&&sel.value&&t.value.trim()){state.learnings[sel.value]=t.value.trim();persist();render();}});
  document.querySelectorAll('[data-dellearn]').forEach(el=>el.onclick=()=>{delete state.learnings[el.dataset.dellearn];persist();render();});
  b('addA',()=>{const t=$('#aTitle').value.trim();if(!t)return;state.assignments.push({id:Date.now()+''+Math.random().toString(36).slice(2,6),course:$('#aCourse').value,title:t,due:$('#aDue').value,status:'open'});persist();render();});
  document.querySelectorAll('[data-toggle]').forEach(el=>el.onclick=()=>{const it=state.assignments.find(x=>x.id===el.dataset.toggle);it.status=it.status==='done'?'open':'done';persist();render();});
  document.querySelectorAll('[data-dela]').forEach(el=>el.onclick=()=>{state.assignments=state.assignments.filter(x=>x.id!==el.dataset.dela);persist();render();});
  document.querySelectorAll('[data-delf]').forEach(el=>el.onclick=()=>{state.friends=state.friends.filter(x=>x!==el.dataset.delf);if(curPerson===el.dataset.delf)curPerson='me';persist();render();});
  if(curTab==='friends'&&me()){const sb=studentSearchBox('frInp','frRes',id=>{
    if(id===state.me){toast("That's you 😄");return;}
    if(!state.friends.includes(id)){state.friends.push(id);persist();render();toast('Added '+titleCase(STU[id].n));}
  });sb.wire();}
}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{if(!me()){openWhoModal();return;}curTab=t.dataset.t;curPerson='me';render();});
$('#targetInp').onchange=e=>{state.target=Math.max(0,Math.min(100,+e.target.value||75));persist();render();};
$('#bellBtn').onclick=toggleReminders;
$('#whoBtn').onclick=openWhoModal;
$('#syncBtn').onclick=()=>state.liveUrl?syncNow(true):openSyncModal();

try{
  render();
}catch(err){
  // Self-heal: a corrupted cached sync can break rendering - drop it and rebuild from built-in data
  try{localStorage.removeItem('t4sched');}catch(e){}
  SCH=window.SCHEDULE||[]; dates=[...new Set(SCH.map(r=>r.date))].sort();
  curDate=todayISO(); curTab='today'; curPerson='me'; curSubject=null;
  try{
    render();
    toast('⚠️ Cached schedule was corrupted — reset to built-in. Tap 🔄 Sync to re-fetch.');
  }catch(e2){
    document.getElementById('view').innerHTML='<div class="card"><h2>⚠️ Something broke</h2><div class="small muted" style="margin-bottom:10px">'+String(e2&&e2.message||e2).replace(/</g,'&lt;')+'</div><button class="btn-accent" onclick="localStorage.clear();location.reload()">Full reset (clears saved data)</button></div>';
  }
}
scheduleReminders();
if(state.liveUrl) syncNow(false);   // auto-refresh from live sheet on every open
loadDataset();                      // pull roster/courses/schedule from the repo database
// stay live while open: re-fetch when the tab regains focus (if >2 min since last) and every 30 minutes
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&state.liveUrl&&Date.now()-(state.lastSync||0)>120000)syncNow(false);});
setInterval(()=>{if(state.liveUrl&&!document.hidden)syncNow(false);},1800000);
</script>
</body>
</html>
